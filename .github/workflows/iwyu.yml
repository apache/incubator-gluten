name: Include What You Use Check

on:
  pull_request:
    paths:
      - '.github/workflows/iwyu.yml'
      - 'cpp/**'

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  MVN_CMD: 'mvn -ntp'
  WGET_CMD: 'wget -nv'
  SETUP: 'source .github/workflows/util/setup-helper.sh'
  CCACHE_DIR: "${{ github.workspace }}/.ccache"
  # spark.sql.ansi.enabled defaults to false.
  SPARK_ANSI_SQL_MODE: false

concurrency:
  group: ${{ github.repository }}-${{ github.head_ref || github.sha }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-native-lib-centos-7:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Get Ccache
        uses: actions/cache/restore@v4
        with:
          path: '${{ env.CCACHE_DIR }}'
          key: ccache-centos7-release-default-${{github.sha}}
          restore-keys: |
            ccache-centos7-release-default
      - name: Build Gluten native libraries
        run: |
          docker pull apache/gluten:vcpkg-centos-8
          docker run -v $GITHUB_WORKSPACE:/work -w /work apache/gluten:vcpkg-centos-8 bash -c "
            set -e
            yum install tzdata -y
            source /opt/rh/gcc-toolset-11/enable
            df -a
            cd /work
            export CCACHE_DIR=/work/.ccache
            mkdir -p /work/.ccache
            wget -q https://github.com/llvm/llvm-project/releases/download/llvmorg-18.1.8/clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04.tar.xz 
            tar -xf clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04.tar.xz
            rm -rf clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04.tar.xz
            cd /work/clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04/bin/ && ls -1 | grep -v \"^clang\" | xargs rm -rf
            ln -s /lib64/libtinfo.so.6.1 /lib64/libtinfo.so.5
            export CC=/work/clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04/bin/clang
            export CXX=/work/clang+llvm-18.1.8-x86_64-linux-gnu-ubuntu-18.04/bin/clang++
            export CXXFLAGS=\"-stdlib=libstdc++ -I/opt/rh/gcc-toolset-11/root/usr/include/c++/11 -I/opt/rh/gcc-toolset-11/root/usr/include/c++/11/x86_64-redhat-linux\"
            export LDFLAGS=\"-L/opt/rh/gcc-toolset-11/root/usr/lib64 -Wl,-rpath,/opt/rh/gcc-toolset-11/root/usr/lib64 -stdlib=libstdc++\"
            cd /work
            bash dev/ci-velox-buildstatic-centos-8.sh
            mkdir -p /work/.m2/repository/org/apache/arrow/
            cp -r /root/.m2/repository/org/apache/arrow/* /work/.m2/repository/org/apache/arrow/
          "
      - name: "Save ccache"
        uses: actions/cache/save@v4
        id: ccache
        with:
          path: '${{ env.CCACHE_DIR }}'
          key: ccache-centos7-release-default-${{github.sha}}
      - uses: actions/upload-artifact@v4
        with:
          name: velox-native-lib-centos-7-${{github.sha}}
          path: ./cpp/build/
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: arrow-jars-centos-7-${{github.sha}}
          path: .m2/repository/org/apache/arrow/
          if-no-files-found: error

  iwyu-check:
    needs: build-native-lib-centos-7
    runs-on: ubuntu-22.04
    container: apache/gluten:centos-8-jdk8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: velox-native-lib-centos-7-${{github.sha}}
          path: ./cpp/build/
      - name: build include-what-you-use
        run: |
          yum install -y llvm llvm-devel clang clang-devel llvm-toolset
          cd $GITHUB_WORKSPACE/
          git clone https://github.com/include-what-you-use/include-what-you-use.git
          cd include-what-you-use
          git checkout clang_12
          mkdir build && cd build
          cmake -G "Unix Makefiles" -DCMAKE_PREFIX_PATH=/usr/include/llvm ../
          make -j$(nproc)
          ls ./bin
          ln -s $GITHUB_WORKSPACE/include-what-you-use/build/bin/include-what-you-use /usr/bin/include-what-you-use
      - name: Check Include What You Use
        run: |
          pip3 install regex
          cd $GITHUB_WORKSPACE/
          sed -i "s|/work|$(pwd)|g" cpp/build/compile_commands.json
          ls /usr/bin/include-what-you-use
          python3 dev/check.py iwyu commit
